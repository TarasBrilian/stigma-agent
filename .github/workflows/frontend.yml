name: frontend

# Runs the frontend's definition-of-done gates on every change that touches
# frontend/ (and on changes to this workflow): strict lint, typecheck, the
# lib/format unit tests, and a production build (which also type-checks).
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - '.github/actions/assert-no-secrets/**'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - '.github/actions/assert-no-secrets/**'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No secrets belong in the client (only NEXT_PUBLIC_* env) — shared repo-wide
      # backstop that no .env / .pem / secrets/ file is ever committed.
      - uses: ./.github/actions/assert-no-secrets

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
